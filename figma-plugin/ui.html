<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; background: #1e1e1e; color: #d4d4d4; }
    h3 { margin: 0 0 8px; font-size: 14px; color: #e8e8e8; }
    p  { margin: 0 0 12px; font-size: 12px; color: #9e9e9e; line-height: 1.5; }
    button { width: 100%; padding: 10px; background: #0e639c; color: white; border: none;
             border-radius: 4px; font-size: 13px; cursor: pointer; }
    button:hover { background: #1177bb; }
    #status { margin-top: 10px; font-size: 12px; color: #9e9e9e; }
  </style>
</head>
<body>
  <h3>Dict App Builder</h3>
  <p>Generates the full Eudic-style dictionary prototype: color styles, components, and Frame 3 (Search Result State).</p>
  <button id="build">Build Design</button>
  <div id="status"></div>
  <script>
    document.getElementById('build').onclick = () => {
      document.getElementById('status').textContent = 'Building…';
      parent.postMessage({ pluginMessage: { type: 'build' } }, '*');
    };
    window.onmessage = (e) => {
      const msg = e.data.pluginMessage;
      if (msg && msg.status) document.getElementById('status').textContent = msg.status;
    };
  </script>
</body>
</html>
